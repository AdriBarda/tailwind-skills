<svg width="900" height="700" viewBox="0 0 900 700" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">tailwind-intellisense-fixer activation flow</title>
  <desc id="desc">Three trigger cases converging into LSP diagnostics, fix, confirm, and report.</desc>

  <rect width="900" height="700" rx="16" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">tailwind-intellisense-fixer</text>
  <text x="450" y="62" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="14" fill="#6B7280">activation flow</text>

  <!-- Case 1 -->
  <rect x="24" y="82" width="264" height="116" rx="12" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="156" y="110" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="13" font-weight="700" fill="#1D4ED8">Case 1 — explicit command</text>
  <text x="156" y="132" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#374151">/tailwind-intellisense-fixer</text>
  <text x="156" y="154" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#374151">→ full repo scan</text>
  <text x="156" y="176" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="11" fill="#6B7280">all Tailwind-bearing files</text>

  <!-- Case 2 -->
  <rect x="318" y="82" width="264" height="116" rx="12" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5"/>
  <text x="450" y="110" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="13" font-weight="700" fill="#C2410C">Case 2 — warning request</text>
  <text x="450" y="132" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#374151">"fix my canonical warnings"</text>
  <text x="450" y="154" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#374151">→ targeted run</text>
  <text x="450" y="176" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="11" fill="#6B7280">relevant files only</text>

  <!-- Case 3 -->
  <rect x="612" y="82" width="264" height="116" rx="12" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
  <text x="744" y="110" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="13" font-weight="700" fill="#15803D">Case 3 — post-write</text>
  <text x="744" y="132" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#374151">agent wrote Tailwind files</text>
  <text x="744" y="154" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#374151">→ silent background check</text>
  <text x="744" y="176" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="11" fill="#6B7280">touched files only</text>

  <!-- Merge: verticals + horizontal + arrow -->
  <line x1="156" y1="198" x2="156" y2="230" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="450" y1="198" x2="450" y2="230" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="744" y1="198" x2="744" y2="230" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="156" y1="230" x2="744" y2="230" stroke="#9CA3AF" stroke-width="1.5"/>
  <line x1="450" y1="230" x2="450" y2="252" stroke="#9CA3AF" stroke-width="1.5"/>
  <polygon points="443,251 457,251 450,263" fill="#9CA3AF"/>

  <!-- Step 1: Run LSP -->
  <rect x="190" y="263" width="520" height="76" rx="12" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="450" y="293" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Run @tailwindcss/language-server</text>
  <text x="450" y="317" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#6B7280">spawned via npx · pnpm dlx · yarn dlx · bunx</text>

  <line x1="450" y1="339" x2="450" y2="361" stroke="#9CA3AF" stroke-width="1.5"/>
  <polygon points="443,360 457,360 450,372" fill="#9CA3AF"/>

  <!-- Step 2: Fix -->
  <rect x="190" y="372" width="520" height="76" rx="12" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="450" y="402" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Collect diagnostics → replace flagged tokens</text>
  <text x="450" y="426" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#6B7280">exact LSP position · no regex · no reformatting</text>

  <line x1="450" y1="448" x2="450" y2="470" stroke="#9CA3AF" stroke-width="1.5"/>
  <polygon points="443,469 457,469 450,481" fill="#9CA3AF"/>

  <!-- Step 3: Confirm -->
  <rect x="190" y="481" width="520" height="76" rx="12" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1.5"/>
  <text x="450" y="511" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Re-run once to confirm</text>
  <text x="450" y="535" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#6B7280">warnings remain after one pass → report, don't retry</text>

  <line x1="450" y1="557" x2="450" y2="579" stroke="#9CA3AF" stroke-width="1.5"/>
  <polygon points="443,578 457,578 450,590" fill="#9CA3AF"/>

  <!-- Step 4: Report -->
  <rect x="190" y="590" width="520" height="76" rx="12" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/>
  <text x="450" y="620" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="14" font-weight="700" fill="#15803D">Tailwind: fixed N warnings in M files.</text>
  <text x="450" y="644" text-anchor="middle" font-family="system-ui, Arial, sans-serif" font-size="12" fill="#6B7280">or: 0 warnings · warnings remain · LS unavailable</text>
</svg>
